# translated from test/test_rainbow_dqn_breakout.sh
family: qnet
runtime:
  device: 0
base:
  env: BreakoutNoFrameskip-v4
  learning_rate: 0.0001
  steps: 5e6
  batch: 32
  train_freq: 4
  final_eps: 0.01
  learning_starts: 20000
  gamma: 0.99
  buffer_size: 1e6
  compress_memory: true
  exploration_fraction: 0.2
  node: 512
  hidden_n: 1
  optimizer: adam
  target_update: 1000
  double: true
  dueling: true
  per: true
  n_step: 3
  noisynet: true  # legacy script used the invalid flag '--noisy'; corrected to --noisynet
variants:
  - {algo: DQN}
  - {algo: C51}
  - {algo: QRDQN, n_support: 200}
  - {algo: IQN}
  - {algo: FQF}
