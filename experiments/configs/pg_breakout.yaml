# translated from test/test_pg_breakout.sh
# Note: LR reassigned mid-script; each python line expanded with its effective value.
# Commented A2C used LR=0.001; active runs use LR=0.0003.
family: pg
runtime:
  device: 0
base:
  # 20 evaluations over the whole run (was hardcoded ~100)
  eval_num: 20
  experiment_name: PG_Breakout
  env: BreakoutNoFrameskip-v4
  worker: 8
  # Default backend is gymnasium; keep EnvPool for this Atari sweep's throughput.
  env_backend: envpool
  steps: 3e7
  batch: 128
  mini_batch: 256
  gamma: 0.99
  lamda: 0.95
  node: 512
  hidden_n: 1
  optimizer: adam
  optimizer_eps: 0.00001
  max_grad_norm: 0.5
  lr_annealing: true
  learning_rate: 0.00025
  ent_coef: 0.01
  val_coef: 0.5
  epoch_num: 4
  value_clip: 0.1
  gae_normalize: true
  gae_normalize_scope: minibatch
variants:
  - {algo: SPO, ppo_eps: 0.1}
  - {algo: TPPO}
  - {algo: PPO, ppo_eps: 0.1}
