family: impala
runtime:
  device: 1
base:
  env: BreakoutNoFrameskip-v4
  steps: 5e5
  batch: 128
  gamma: 0.99
  worker: 16
  ent_coef: 1e-2
  node: 512
  hidden_n: 1
  sample_size: 32
  update_freq: 100
  val_coef: 0.6
  buffer_size: 256
  optimizer: rmsprop
variants:
  - {algo: PPO, learning_rate: 0.00003}
