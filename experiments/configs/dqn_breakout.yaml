# translated from test/test_dqn_breakout.sh
family: qnet
runtime:
  device: 0
base:
  # 20 evaluations over the whole run (was hardcoded ~100)
  eval_num: 20
  experiment_name: DQN_Breakout
  env: BreakoutNoFrameskip-v4
  learning_rate: 0.00005
  steps: 5e6
  batch: 32
  train_freq: 4
  final_eps: 0.01
  learning_starts: 20000
  gamma: 0.99
  buffer_size: 1e6
  compress_memory: true
  exploration_fraction: 0.2
  use_checkpointing: true
  node: 512
  hidden_n: 1
  optimizer: adam
  target_update: 1000
variants:
  - {algo: DQN}
  - {algo: DQN, munchausen: true}
  - {algo: C51}
  - {algo: C51, munchausen: true}
  - {algo: QRDQN, n_support: 200}
  - {algo: QRDQN, n_support: 200, munchausen: true}
  - {algo: IQN}
  - {algo: IQN, munchausen: true}
  - {algo: FQF}
  - {algo: FQF, munchausen: true}
