# translated from test/test_ppo.sh
family: pg
runtime:
  device: 0
base:
  # 20 evaluations over the whole run (was hardcoded ~100)
  eval_num: 20
  env: BreakoutNoFrameskip-v4
  learning_rate: 0.00003
  steps: 2e6
  worker: 32
  # Default backend is gymnasium; keep EnvPool for this Atari sweep's throughput.
  env_backend: envpool
  batch: 32
  mini_batch: 256
  gamma: 0.995
  lamda: 0.95
  ent_coef: 1e-3
  node: 512
  hidden_n: 1
  optimizer: rmsprop
variants:
  - {algo: PPO}
