# translated from test/test_dpg_Humanoid.sh
family: dpg
runtime:
  device: 0
  xvfb: true
base:
  # 20 evaluations over the whole run (was hardcoded ~100)
  eval_num: 20
  experiment_name: DPG_Humanoid
  env: Humanoid-v5
  worker: 32
  # Default backend is gymnasium; keep EnvPool for this Atari sweep's throughput.
  env_backend: envpool
  learning_rate: 0.0003
  steps: 5e6
  buffer_size: 1e6
  batch: 256
  target_update_tau: 5e-3
  learning_starts: 50000
  node: 256
  hidden_n: 2
  optimizer: adam
variants:
  - {algo: TD3}
  - {algo: TD3, simba: true}
  - {algo: TD3, simbav2: true}
  - {algo: SAC}
  - {algo: SAC, simba: true}
  - {algo: SAC, simbav2: true}
  - {algo: TQC}
  - {algo: TQC, simba: true}
  - {algo: TQC, simbav2: true}
  - {algo: CrossQ}
