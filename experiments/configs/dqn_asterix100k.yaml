# translated from test/test_dqn_asterix100k.sh
family: qnet
runtime:
  device: 5
base:
  experiment_name: DQN_Asterix100k
  env: AsterixNoFrameskip-v4
  learning_rate: 0.0001
  node: 512
  hidden_n: 1
  optimizer: adamw
variants:
  # Group 1: train_freq=4, gradient_steps=1
  - algo: DQN
    steps: 1e5
    batch: 32
    train_freq: 4
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    target_update: 1000
    gradient_steps: 1
    double: true
    dueling: true
    per: true
    n_step: 3
    noisynet: true
  - algo: C51
    steps: 1e5
    batch: 32
    train_freq: 4
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    target_update: 1000
    gradient_steps: 1
    double: true
    dueling: true
    per: true
    n_step: 3
    noisynet: true
  # Group 2: High replay ratio, train_freq=1, gradient_steps=2
  - algo: DQN
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    target_update: 1000
    gradient_steps: 2
    double: true
    dueling: true
    per: true
    n_step: 3
    noisynet: true
  - algo: C51
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    target_update: 1000
    gradient_steps: 2
    double: true
    dueling: true
    per: true
    n_step: 3
    noisynet: true
  - algo: SPR
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    gradient_steps: 2
    max: 15
    min: -15
  - algo: SPR
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    gradient_steps: 2
    max: 15
    min: -15
    scaled_by_reset: true
  - algo: BBF
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    gradient_steps: 2
    max: 15
    min: -15
  # Group 3: Super high replay ratio, gradient_steps=8
  - algo: SPR
    steps: 1e5
    batch: 32
    train_freq: 1
    final_eps: 0.01
    learning_starts: 2000
    gamma: 0.99
    buffer_size: 1e5
    exploration_fraction: 0.2
    use_checkpointing: true
    gradient_steps: 8
    max: 15
