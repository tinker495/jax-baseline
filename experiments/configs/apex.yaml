family: apex_qnet
runtime:
  device: 1
base:
  env: SpaceInvadersNoFrameskip-v4
  learning_rate: 0.00005
  steps: 2e5
  batch_num: 16
  batch_size: 512
  target_update: 20
  learning_starts: 50000
  gamma: 0.99
  buffer_size: 5e5
  worker: 32
  node: 512
  hidden_n: 0
  optimizer: rmsprop
variants:
  - algo: QRDQN
    double: true
    n_step: 3
    initial_eps: 0.4
    eps_decay: 7
    max: 10
    min: -10
