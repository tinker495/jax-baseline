# translated from test/test_apex.sh
# Note: CUDA_VISIBLE_DEVICES changes mid-script (0 -> 1 before commented C51).
# Active QRDQN run executes after the device=1 export, so device=1 applies.
# Commented DQN used device=0; commented C51 used device=1.
family: apex_qnet
runtime:
  device: 1
base:
  env: SpaceInvadersNoFrameskip-v4
  learning_rate: 0.00005
  steps: 2e5
  batch_num: 16
  batch_size: 512
  target_update: 20
  learning_starts: 50000
  gamma: 0.99
  buffer_size: 5e5
  worker: 32
  node: 512
  hidden_n: 0
  optimizer: rmsprop
variants:
  - algo: DQN
    double: true
    dueling: true
    n_step: 3
    initial_eps: 0.4
    eps_decay: 7
    enabled: false
  - algo: C51
    double: true
    n_step: 3
    initial_eps: 0.4
    eps_decay: 7
    max: 10
    min: -10
    enabled: false
  - algo: QRDQN
    double: true
    n_step: 3
    initial_eps: 0.4
    eps_decay: 7
    max: 10
    min: -10
