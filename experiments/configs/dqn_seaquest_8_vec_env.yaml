# translated from test/test_dqn_seaquest.sh
family: qnet
runtime:
  device: 0
base:
  # 20 evaluations over the whole run (was hardcoded ~100)
  eval_num: 20
  experiment_name: DQN_Seaquest
  env: SeaquestNoFrameskip-v4
  worker: 8
  # Default backend is gymnasium; keep EnvPool for this Atari sweep's throughput.
  env_backend: envpool
  learning_rate: 0.0001
  steps: 5e6
  batch: 32
  train_freq: 4
  final_eps: 0.01
  learning_starts: 20000
  gamma: 0.99
  buffer_size: 5e5
  exploration_fraction: 0.2
  node: 512
  hidden_n: 1
  optimizer: adam
  target_update: 1000
variants:
  - {algo: DQN}
  - {algo: DQN, munchausen: true}
  - {algo: C51}
  - {algo: C51, munchausen: true}
  - {algo: QRDQN, n_support: 200}
  - {algo: QRDQN, n_support: 200, munchausen: true}
  - {algo: IQN}
  - {algo: IQN, munchausen: true}
  - {algo: FQF}
  - {algo: FQF, munchausen: true}
